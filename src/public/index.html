<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColonyGame</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Name Entry -->
  <div id="name-screen" class="screen active">
    <div class="center-box">
      <h1>ColonyGame</h1>
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
      <button id="name-submit">Play</button>
    </div>
  </div>

  <!-- Lobby -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-header">
      <h2>Game Lobby</h2>
      <span id="player-name-display"></span>
      <button id="create-room-btn">Create Room</button>
    </div>
    <div id="room-list"></div>

    <!-- Create Room Dialog -->
    <div id="create-room-dialog" class="dialog hidden">
      <div class="dialog-content">
        <h3>Create Room</h3>
        <label>Room Name
          <input type="text" id="room-name-input" maxlength="30" placeholder="My Room" autocomplete="off">
        </label>
        <label>Max Players
          <select id="room-max-players">
            <option value="2">2</option>
            <option value="4" selected>4</option>
            <option value="6">6</option>
            <option value="8">8</option>
          </select>
        </label>
        <label>Match Timer
          <select id="room-match-timer">
            <option value="10">10 min</option>
            <option value="20" selected>20 min</option>
            <option value="30">30 min</option>
            <option value="0">Unlimited</option>
          </select>
        </label>
        <div class="dialog-buttons">
          <button id="room-create-confirm">Create</button>
          <button id="room-create-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Room View -->
  <div id="room-screen" class="screen">
    <div class="room-header">
      <h2 id="room-title"></h2>
      <button id="leave-room-btn">Leave</button>
    </div>
    <div id="player-list"></div>
    <div class="room-actions">
      <button id="ready-btn">Ready</button>
      <button id="launch-btn" class="hidden">Launch Game</button>
    </div>
    <div id="room-chat">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Chat..." maxlength="200" autocomplete="off">
    </div>
  </div>

  <!-- Game View -->
  <div id="game-screen" class="screen">
    <div id="render-container"></div>
    <div id="colony-ui">
      <!-- Resource bar (top) -->
      <div id="resource-bar">
        <div class="res-item" data-res="energy"><span class="res-icon" style="color:#f1c40f">⚡</span><span class="res-name">Energy</span><span class="res-val" id="res-energy">0</span><span class="res-net" id="res-energy-net"></span></div>
        <div class="res-item" data-res="minerals"><span class="res-icon" style="color:#95a5a6">⛏</span><span class="res-name">Minerals</span><span class="res-val" id="res-minerals">0</span><span class="res-net" id="res-minerals-net"></span></div>
        <div class="res-item" data-res="food"><span class="res-icon" style="color:#2ecc71">🌾</span><span class="res-name">Food</span><span class="res-val" id="res-food">0</span><span class="res-net" id="res-food-net"></span></div>
        <div class="res-item" data-res="alloys"><span class="res-icon" style="color:#e67e22">⚙</span><span class="res-name">Alloys</span><span class="res-val" id="res-alloys">0</span><span class="res-net" id="res-alloys-net"></span></div>
        <div class="res-item" data-res="research"><span class="res-icon" style="color:#3498db">🔬</span><span class="res-name">Research</span><span class="res-val" id="res-research">0</span><span class="res-net" id="res-research-net"></span></div>
        <div class="res-item" data-res="influence"><span class="res-icon" style="color:#9b59b6">★</span><span class="res-name">Influence</span><span class="res-val" id="res-influence">0</span></div>
      </div>

      <!-- Status bar (below resource bar) -->
      <div id="status-bar">
        <span id="status-speed">1x</span>
        <span class="status-sep">|</span>
        <span id="status-timer" class="hidden"></span>
        <span id="status-timer-sep" class="status-sep hidden">|</span>
        <span id="status-month">Month 0</span>
        <span class="status-sep">|</span>
        <span id="status-pops">Pop: 0/0</span>
        <span class="status-sep">|</span>
        <span id="status-growth">Growth: —</span>
        <div id="growth-bar-wrap"><div id="growth-bar-fill"></div></div>
        <span class="status-sep">|</span>
        <span id="status-vp">VP: 0</span>
      </div>
      <!-- Pause overlay -->
      <div id="pause-overlay" class="hidden">PAUSED</div>

      <!-- Colony info panel (right side) -->
      <div id="colony-panel" class="game-panel">
        <div class="panel-header"><span id="colony-panel-title">Colony</span></div>
        <div id="colony-panel-body">
          <div class="info-row"><span class="info-label">Planet</span><span class="info-value" id="cp-planet">—</span></div>
          <div class="info-row"><span class="info-label">Districts</span><span class="info-value" id="cp-districts">0/0</span></div>
          <div class="info-row"><span class="info-label">Working</span><span class="info-value" id="cp-working">0</span></div>
          <div class="info-row"><span class="info-label">Idle</span><span class="info-value" id="cp-idle">0</span></div>
          <div class="info-row"><span class="info-label">Housing</span><span class="info-value" id="cp-housing">0/0</span></div>
        </div>
        <div id="colony-queue-header" class="hidden">Build Queue</div>
        <div id="colony-queue-list"></div>
      </div>

      <!-- Research panel — toggled with R key or button -->
      <div id="research-panel" class="game-panel hidden">
        <div class="panel-header">Research<button id="research-panel-close" class="panel-close">&times;</button></div>
        <div id="research-tracks"></div>
      </div>

      <!-- Scoreboard overlay — toggled with Tab key -->
      <div id="scoreboard" class="game-panel hidden">
        <div class="panel-header">Scoreboard<button id="scoreboard-close" class="panel-close">&times;</button></div>
        <div id="scoreboard-body"></div>
      </div>

      <!-- Game over overlay -->
      <div id="game-over-overlay" class="hidden">
        <div id="game-over-content">
          <h2 id="game-over-title">Game Over</h2>
          <div id="game-over-winner"></div>
          <div id="game-over-scores"></div>
          <button id="game-over-lobby-btn">Return to Lobby</button>
        </div>
      </div>

      <!-- Match warning banner -->
      <div id="match-warning" class="hidden"></div>

      <!-- Toast notification container -->
      <div id="toast-container"></div>

      <!-- Colony list sidebar (left) — appears with 2+ colonies -->
      <div id="colony-list-sidebar" class="hidden"></div>

      <!-- View indicator (bottom-left) -->
      <div id="view-indicator"><span id="view-indicator-label">Colony</span> <span class="view-hint">[G] toggle</span></div>

      <!-- System info panel (galaxy view, right side) -->
      <div id="system-panel" class="game-panel hidden">
        <div class="panel-header"><span id="system-panel-title">System</span><button id="system-panel-close" class="panel-close">&times;</button></div>
        <div id="system-panel-body"></div>
      </div>

      <!-- Build menu — appears when empty tile clicked -->
      <div id="build-menu" class="game-panel hidden">
        <div class="panel-header">Build District<button id="build-menu-close" class="panel-close">&times;</button></div>
        <div id="build-menu-resources"></div>
        <div id="build-menu-options"></div>
      </div>
      <!-- District info — appears when built district clicked -->
      <div id="district-info" class="game-panel hidden">
        <div class="panel-header"><span id="district-info-title">District</span><button id="district-info-close" class="panel-close">&times;</button></div>
        <div id="district-info-body"></div>
        <button id="district-demolish-btn" class="demolish-btn">Demolish</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/fog-of-war.js"></script>
  <script src="js/galaxy-view.js"></script>
  <script src="js/toast-format.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
